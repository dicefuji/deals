<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Deals</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <p class="eyebrow">Local-first recommender</p>
        <h1>Pick the best food-delivery deal without checking both apps yourself.</h1>
        <p class="lede">
          Compare DoorDash and Uber Eats, rank BOGO and other promos by real value, and get one recommendation with a short explanation.
        </p>
      </section>

      <section class="panel">
        <form id="deal-form" class="controls">
          <label>
            Meal intent
            <input name="query" type="text" value="Dinner" />
          </label>
          <label>
            Address
            <input name="address" type="text" value="San Francisco, CA" />
          </label>
          <label>
            Cuisine
            <select name="cuisine">
              <option>Any</option>
              <option>Asian</option>
              <option>American</option>
              <option>Italian</option>
              <option>Mexican</option>
            </select>
          </label>
          <label>
            Budget
            <input name="budget" type="number" min="5" step="1" value="35" />
          </label>
          <label>
            Max ETA
            <input name="maxEtaMinutes" type="number" min="10" step="1" value="45" />
          </label>
          <label class="checkbox">
            <input name="prioritizeBogo" type="checkbox" checked />
            Prefer BOGO first
          </label>
          <label>
            Data mode
            <select name="mode">
              <option value="mock">Mock data</option>
              <option value="live">Live browser collection</option>
            </select>
          </label>
          <button type="submit">Find my best deal</button>
        </form>
      </section>

      <section id="results" class="results"></section>
    </main>
    <script type="module" src="/app.js"></script>
  </body>
</html>
